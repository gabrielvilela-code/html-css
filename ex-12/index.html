<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagens dinamicas</title>
</head>
<body>
    <h1>imagens dinâmicas</h1>
    <p>tente abrir esse site em varios dispositivios diferentes.</p>
    <picture>
        <source media="(max-width:750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width:1050px )" srcset="imagens/foto-m.png">

        <img src="imagens/foto-g.png" alt="imagem flexivel">
    </picture>
    <h1>reproduzindo audio</h1>
    <p>vamos aprender a reproduzir audio em html.</p>
    <audio controls>
        <source src="midia/rap-1.mp3" type="audio/mpeg">
        <p>se você não pode ouvir o audio </p>



    </audio>
    
</body>
</html>
