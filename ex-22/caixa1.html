<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>modelos de caixas</title>
    <style>
        h1{
            background-color: brown;
            height:300px;
            width:300px;

            border: 12px solid aquamarine


            padding  10px;

          
        
            margin: 20px 20px 40px 20px ;


            outline: 5px dashed gold;

        }
        a{
            

            border: 3px ridge chartreuse;

           

            padding: 3px 3px 3px 3px;

        }
    </style>
</head>
<body>
    <h1>exemplos de caixa box-level</h1>
    <p>parágrafos também são exemplos de box-level,mas os <a href="#">mas os links são exemplos de caixa inline-level.</a>vamos ver como tudo funciona.</p>
    
</body>
</html>
