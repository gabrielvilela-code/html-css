<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: blue;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: rgb(29, 54, 92);
        }
        a:hover{
            text-decoration: underline;
        }
        a:active{
            color: darkmagenta;
        }
        

    </style>
</head>
<body>
    <h1>personalizando links</h1>
    <ul>
        <li><a href="https://www.youtube.com/" target="_blank">site do youtube</a></li>
        <li><a href="https://www.amazon.com.br">site de vendas de computador</a></li>
        <li><a href="https://www.playstation.com">loja de jogos de Play 4 </a></li>
    </ul>
    
</body>
</html>
