<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo de hover</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        div > p {
            display: none;
        }
        div:hover > p {
            display:block;
            color: white;
            background-color: brown;
            width: 300px;
        }
        div:hover{
            color: brown;
        }
    </style>
</head>
<body>
    <h1>exemplo de hover</h1>
    <p>passe o mousesobre o texto</p>
    <div>passe o mouse aqui
        <p>texto escondido...</p>
    </div>
    
</body>
</html>
